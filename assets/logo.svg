<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#4A90D9"/>

  <!-- Brain shape -->
  <g transform="translate(100,95)">
    <!-- Left hemisphere -->
    <path d="M-8,-35 C-30,-38 -52,-28 -55,-8 C-58,8 -48,20 -38,26
             C-42,32 -40,42 -30,44 C-20,46 -14,38 -12,30
             C-10,36 -4,40 2,38 L2,-35 Z"
          fill="white" opacity="0.95"/>
    <!-- Right hemisphere -->
    <path d="M8,-35 C30,-38 52,-28 55,-8 C58,8 48,20 38,26
             C42,32 40,42 30,44 C20,46 14,38 12,30
             C10,36 4,40 -2,38 L-2,-35 Z"
          fill="white" opacity="0.85"/>
    <!-- Center line -->
    <line x1="0" y1="-35" x2="0" y2="38" stroke="#4A90D9" stroke-width="2.5"/>
    <!-- Brain folds left -->
    <path d="M-20,-20 Q-35,-15 -38,0" stroke="#4A90D9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M-18,5 Q-32,10 -34,22" stroke="#4A90D9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Brain folds right -->
    <path d="M20,-20 Q35,-15 38,0" stroke="#4A90D9" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M18,5 Q32,10 34,22" stroke="#4A90D9" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Heart pulse line at bottom -->
  <polyline points="30,155 55,155 65,135 75,170 85,145 95,155 115,155 125,140 135,165 145,155 170,155"
            fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
